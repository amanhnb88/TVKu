name: Build Android APK

# Dijalankan saat ada kode baru di cabang main, atau dijalankan manual
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Mengambil Kode
        uses: actions/checkout@v4

      - name: ⚙️ Menyiapkan Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: ☕ Menyiapkan Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📦 Menginstal Dependencies
        run: npm install

      - name: 🏗️ Prebuild Expo ke Android Asli
        run: npx expo prebuild --platform android

      - name: 🚀 Merakit APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: 📤 Mengunggah APK
        uses: actions/upload-artifact@v4
        with:
          name: TVKu-App-Release
          path: android/app/build/outputs/apk/release/app-release.apk
